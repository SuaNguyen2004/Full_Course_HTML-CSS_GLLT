<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12.2</title>
  </head>
  <body>
    <a href="mailto:tuhoc.cc@gmail.com">Gửi email cho bé </a><br />

    <!-- 1 số tham số có thể truyền trước cho : mailto
    cc: danh sách email sẽ nhận được bản sao của thư.
    bcc: danh sách email ẩn sẽ nhận được bản sao của thư.
    subject: chủ đề của thư.
    body: nội dung của mail.
    ?: dấu phân cách giữa phần mailto và tham số.
    &: dấu phân cách tham số. -->
    <a
      href="mailto:tuhoc.cc@gmail.com?cc=admin@domain.com&subject=Cứu em với&Bcc=admin@gmail.com&body= Admin ơi cứu với "
      >Gửi email
    </a>
  </body>
</html>
