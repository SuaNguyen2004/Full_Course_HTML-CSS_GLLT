<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>32. Attribute selectors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- target = _blank là khi click vào thì sẽ mở sang tab mới -->
    <a href="http://tuhoc.cc" target="_blank">Click vào em đi 1</a>
    <!-- target = _self là khi click vào thì sẽ mở ở tab hiện tại và nó là mặc định nếu không ghi -->
    <a href="http://tuhoc.cc" target="_self">Click vào em đi 2</a>
    <a href="http://tuhoc.cc" target="_blank">Click vào em đi 3</a>
    <p href>Lorem ipsum dolor sit amet.</p>
  </body>
</html>
