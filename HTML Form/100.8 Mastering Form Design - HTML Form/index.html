<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>100.8 Mastering Form Design - HTML Form</title>
    </head>
    <body>
        <form action="" class="login-form">
            <label>
                Username:
                <input
                    tabindex="1"
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Nhap username" />
            </label>
            <br />
            <br />
            <label>
                Password:
                <input
                    tabindex="3"
                    type="text"
                    name="password"
                    id="password"
                    placeholder="Nhap password" />
            </label>
            <br />
            <br />
            <label>
                Email:
                <input tabindex="2" type="text" name="email" id="email" placeholder="Nhap email" />
            </label>
            <br />
            <br />
            <button>Submit</button>

            <fieldset>
                <legend>Tieu de</legend>

                <input type="radio" id="kraken" name="monster" value="K" />
                <label for="kraken">Kraken</label>
                <br />

                <input type="radio" id="sasquatch" name="monster" value="S" />
                <label for="sasquatch">Sasquatch</label>
                <br />

                <input type="radio" id="mothman" name="monster" value="M" />
                <label for="mothman">Mothman</label>
            </fieldset>
        </form>
    </body>
</html>
