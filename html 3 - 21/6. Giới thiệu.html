<!DOCTYPE html>
<!-- <! DOCTYPE html> là một khai báo doctype (document type declaration) trong HTML, Đây là mã
khai bao cho trình duyệt biết rằng bạn đang sử dung HTML5 - Phiên bản mới nhất của HTML hiện
tại -->
<html lang="en">
  <!-- Cặp thẻ <html> </html> được sử dụng để định nghĩa phần thân của tài liệu HTML
    Thẻ html có thể dùng kèm thuộc tính lang để chỉ ngôn ngữ được viết của website
    Trong 1 file html chỉ có duy nhất 1 cặp thẻ <html></html> -->
  <head>
    <!-- Thẻ head là một phần tử HTML được sử dụng để chứa các thông tin về trang web mà không được
hiển thị trực tiếp trên trình duyệt của người dùng.

    Các thông tin trong thẻ head như tiêu đề trang, mô tả trang, từ khóa, thông tin tác giả, các tập tin CSS
và JavaScript được liên kết với trang, và nhiều thông tin khác.

    Các thông tin trong thẻ head rất quan trọng cho việc tối ưu hóa công cụ tìm kiếm (SEO), vì chúng
giúp các công cụ tìm kiếm hiểu được nội dung và ý nghĩa của trang web. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <h1>Xin chao</h1>
      <h2>hẹ hẹ helia</h2>
      <h3>Lorem ipsum dolor sit amet.</h3>
    </main>
  </body>
</html>
